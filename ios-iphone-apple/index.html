<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Escala do Culto • Vida Nova Ancuri</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&family=Shrikhand&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <section class="container planodefundo">
            <form class="row formulario">
                <input type="date" id="dataCulto" class="data">
                <select id="porteiro" class="campo portaria"></select>
                <select id="acolhimento1" class="campo acolhimento1"></select>
                <select id="acolhimento2" class="campo acolhimento2"></select>
                <select id="diacono1" class="campo diaconia1"></select>
                <select id="diacono2" class="campo diaconia2"></select>
                <select id="salinha1" class="campo salinha1"></select>
                <select id="salinha2" class="campo salinha2"></select>
                <select id="pregador" class="campo pregacao"></select>
                <select id="midias" class="campo midias"></select>
                <input type="text" id="temaCulto" class="campo tema">
                
                <button type="button" class="btn-enviar" onclick="gerarMensagem()">
                    Enviar escala no WhatsApp
                </button>
            </form>
        </section>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
        <script src="script.js"></script>
    </body>
</html>
